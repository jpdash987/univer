server:
  port: 8086

spring:
  application:
    name: finance-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ums?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root@1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  currency: ${APP_CURRENCY:USD}
  payments:
    provider: ${PAYMENT_PROVIDER:DUMMY} # DUMMY (default), STRIPE, RAZORPAY
    receipt-base-url: ${RECEIPT_BASE_URL:https://example.com/receipts}

logging:
  level:
    root: INFO