server:
  port: 8087

spring:
  application:
    name: notification-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ums_notification?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:}
    consumer:
      group-id: ${KAFKA_GROUP_ID:notification-service}
      auto-offset-reset: latest

  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}

app:
  messaging:
    kafka:
      enabled: ${APP_MESSAGING_KAFKA_ENABLED:false}
    sqs:
      enabled: ${APP_MESSAGING_SQS_ENABLED:false}
  ses:
    from-address: ${SES_FROM_ADDRESS:}
  sns:
    sms:
      sender-id: ${SMS_SENDER_ID:UMS}
  kafka:
    topics:
      admissionApproved: ${TOPIC_ADMISSION_APPROVED:admissions.approved}
      feePaid: ${TOPIC_FEE_PAID:finance.fee_paid}
      gradeUploaded: ${TOPIC_GRADE_UPLOADED:academic.grade_uploaded}
  sqs:
    queues:
      admissionApproved: ${SQS_QUEUE_ADMISSION_APPROVED:admissions-approved-queue}
      feePaid: ${SQS_QUEUE_FEE_PAID:fee-paid-queue}
      gradeUploaded: ${SQS_QUEUE_GRADE_UPLOADED:grade-uploaded-queue}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO