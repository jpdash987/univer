server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      default-filters:
        # By default, pass Authorization header through
        - RemoveHopByHopHeaders=connection,keep-alive,proxy-authenticate,proxy-authorization,te,trailer,transfer-encoding,upgrade
      routes:
        - id: teacher
          uri: ${TEACHER_URI:http://teacher-service:8084}
          predicates:
            - Path=/api/teachers/**
        - id: admin
          uri: ${ADMIN_URI:http://admin-service:8082}
          predicates:
            - Path=/api/admin/**
        - id: academic
          uri: ${ACADEMIC_URI:http://academic-service:8083}
          predicates:
            - Path=/academic/**
        - id: finance
          uri: ${FINANCE_URI:http://finance-service:8086}
          predicates:
            - Path=/finance/**
        - id: notification
          uri: ${NOTIFICATION_URI:http://notification-service:8087}
          predicates:
            - Path=/notifications/**,/api/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO